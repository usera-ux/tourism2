<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BMC Tourism — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #111111; --white: #ffffff; --orange: #e8640a; }
    html, body { height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* ══ LEFT PANEL ══ */
    .left-panel {
      background: var(--orange);
      display: flex;
      flex-direction: column;
      padding: 36px 40px 40px;
      position: relative;
      overflow: hidden;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }
    .brand-main {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .brand-main span { color: rgba(255,255,255,0.7); }
    .brand-sub {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    .illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    /* Inline SVG illustration of a worker */
    .illustration svg {
      width: min(380px, 80%);
      height: auto;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.15));
      animation: floatIllo 4s ease-in-out infinite;
    }
    @keyframes floatIllo {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* ══ RIGHT PANEL ══ */
    .right-panel {
      background: #fff;
      display: flex;
      flex-direction: column;
      padding: 32px 56px;
      position: relative;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: color 0.15s;
      width: fit-content;
    }
    .back-btn:hover { color: var(--black); }
    .back-btn svg { width: 16px; height: 16px; }

    .right-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 360px;
      margin: 0 auto;
      width: 100%;
      gap: 0;
      opacity: 0;
      animation: fadeUp 0.6s 0.15s forwards;
    }

    .welcome-title {
      font-size: clamp(22px, 2.5vw, 32px);
      font-weight: 900;
      letter-spacing: -0.8px;
      color: var(--black);
      line-height: 1.2;
      margin-bottom: 14px;
      text-align: center;
    }

    .welcome-sub {
      font-size: 14px;
      color: #888;
      font-weight: 400;
      margin-bottom: 40px;
      text-align: center;
    }

    .role-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform 0.15s, box-shadow 0.2s, filter 0.15s;
    }

    .role-btn--investor {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 6px 20px rgba(232,100,10,0.3);
      margin-bottom: 16px;
    }
    .role-btn--investor:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(232,100,10,0.4);
      filter: brightness(1.05);
    }

    .role-btn--admin {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 6px 20px rgba(232,100,10,0.3);
    }
    .role-btn--admin:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(232,100,10,0.4);
      filter: brightness(1.05);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 260px 1fr; overflow: auto; }
      html, body { overflow: auto; }
      .left-panel { padding: 24px; }
      .illustration svg { width: 180px; }
      .right-panel { padding: 28px 24px; }
    }
  </style>
</head>
